<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Live Audio</title>
  <script type="importmap">
    { "imports": { "@google/genai": "https://esm.sh/@google/genai@^1.15.0" } }
  </script>
</head>
<body>
  <gdm-live-audio></gdm-live-audio>

  <script type="module">
    import { GoogleGenAI, Modality } from "@google/genai";

    function encode(bytes) {
      let b = "";
      for (let i = 0; i < bytes.byteLength; i++) b += String.fromCharCode(bytes[i]);
      return btoa(b);
    }
    function decode(b64) {
      const s = atob(b64);
      const len = s.length;
      const out = new Uint8Array(len);
      for (let i = 0; i < len; i++) out[i] = s.charCodeAt(i);
      return out;
    }
    function createBlob(data) {
      const l = data.length;
      const i16 = new Int16Array(l);
      for (let i = 0; i < l; i++) i16[i] = data[i] * 32768;
      return { data: encode(new Uint8Array(i16.buffer)), mimeType: "audio/pcm;rate=16000" };
    }
    async function decodeAudioData(data, ctx, sampleRate, numChannels) {
      const frames = data.length / 2 / numChannels;
      const buf = ctx.createBuffer(numChannels || 1, frames, sampleRate);
      const i16 = new Int16Array(data.buffer);
      const l = i16.length;
      const f32 = new Float32Array(l);
      for (let i = 0; i < l; i++) f32[i] = i16[i] / 32768.0;

      if (!numChannels || numChannels === 1) {
        buf.copyToChannel(f32, 0);
      } else {
        for (let c = 0; c < numChannels; c++) {
          const ch = f32.filter((_, idx) => idx % numChannels === c);
          buf.copyToChannel(ch, c);
        }
      }
      return buf;
    }

    class GdmLiveAudio extends HTMLElement {
      constructor() {
        super();
        this.inputAudioContext = null;
        this.outputAudioContext = null;
        this.inputNode = null;
        this.outputNode = null;
        this.sources = new Set();
        this.nextStartTime = 0;
        this.client = null;
        this.session = null;
        this.isStreaming = false;
        this.hasSession = false;
        this.isModelSpeaking = false;
        this.activeSources = 0;

        // Simple state for SwiftUI mirroring
        this._state = { isStreaming: false, isSpeaking: false, hasSession: false };

        this.shadow = this.attachShadow({ mode: "open" });
        this.shadow.innerHTML = `<div><button id="waveBtn">Start Microphone</button></div>`;
        this.waveBtn = this.shadow.getElementById("waveBtn");
        this.waveBtn.addEventListener("click", () => this.toggleMic());
      }

      // ---- State mirroring to SwiftUI via document.title ----

      syncStateToTitle() {
        try {
          document.title = JSON.stringify(this._state);
        } catch {}
      }
      
      setStreaming(v) {
        // Preserve the current streaming state if model is speaking
        if (this.isModelSpeaking) {
          // Don't change streaming state while model is speaking
          return;
        }
        
        this._state.isStreaming = !!v;
        this.syncStateToTitle();
      }
      
      setSpeaking(v) {
        this.isModelSpeaking = !!v;
        this._state.isSpeaking = !!v;
        
        if (v) {
          // When model starts speaking, ensure streaming shows false
          this._state.isStreaming = false;
        } else {
          // When model stops speaking, restore streaming state if we're actually streaming
          if (this.isStreaming && this.hasSession) {
            this._state.isStreaming = true;
          }
        }
        
        this.syncStateToTitle();
      }
      
      setHasSession(v) {
        this._state.hasSession = !!v;
        this.syncStateToTitle();
      }

      connectedCallback() {
        this.syncStateToTitle();
      }

      // ---- Audio/session internals ----

      initAudioIfNeeded() {
        if (!this.inputAudioContext) {
          this.inputAudioContext = new AudioContext({ sampleRate: 16000 });
          this.inputNode = this.inputAudioContext.createGain();
        }
        if (!this.outputAudioContext) {
          this.outputAudioContext = new AudioContext({ sampleRate: 24000 });
          this.outputNode = this.outputAudioContext.createGain();
          this.outputNode.connect(this.outputAudioContext.destination);
        }
        this.nextStartTime = this.outputAudioContext.currentTime;
      }

      getApiKey() {
        const url = new URL(window.location.href);
        return url.searchParams.get("key") || window.GEMINI_API_KEY;
      }

      async ensureClient() {
        if (this.client) return;
        const apiKey = this.getApiKey();
        if (!apiKey) throw new Error("Missing API key");
        this.client = new GoogleGenAI({ apiKey });
      }

      async ensureSession() {
        if (this.session) return;
        await this.ensureClient();
        this.session = await this.client.live.connect({
          model: "gemini-live-2.5-flash-preview",
          callbacks: {
            onopen: () => {
              this.hasSession = true;
              this.setHasSession(true);
            },
            onmessage: async (message) => {
              const audio = message.serverContent?.modelTurn?.parts?.[0]?.inlineData;
              if (audio && this.outputAudioContext) {
                this.activeSources++;
                this.setSpeaking(true);
                
                this.nextStartTime = Math.max(this.nextStartTime, this.outputAudioContext.currentTime);
                const audioBuffer = await decodeAudioData(decode(audio.data), this.outputAudioContext, 24000, 1);
                const source = this.outputAudioContext.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(this.outputNode);
                
                source.addEventListener("ended", () => {
                  this.sources.delete(source);
                  this.activeSources--;
                  
                  // Only stop speaking when all audio sources have finished
                  if (this.activeSources <= 0) {
                    this.activeSources = 0;
                    // Small delay to ensure smooth transition
                    setTimeout(() => {
                      if (this.activeSources === 0) {
                        this.setSpeaking(false);
                      }
                    }, 50);
                  }
                });
                
                source.start(this.nextStartTime);
                this.nextStartTime += audioBuffer.duration;
                this.sources.add(source);
              }
              
              const interrupted = message.serverContent?.interrupted;
              if (interrupted) {
                this.activeSources = 0;
                for (const s of this.sources.values()) {
                  try { s.stop(); } catch {}
                  this.sources.delete(s);
                }
                this.nextStartTime = this.outputAudioContext?.currentTime ?? 0;
                this.setSpeaking(false);
              }
            },
            onclose: () => {
              this.setHasSession(false);
              this.hasSession = false;
            }
          },
          config: {
            responseModalities: [Modality.AUDIO],
            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Orus" } }, languageCode: "en-US" },
          },
        });
      }

      updateButtonLabel() {
        this.waveBtn.textContent = this.isStreaming ? "Pause Microphone" : "Start Microphone";
        // Don't call setStreaming here to avoid state conflicts
      }

      async toggleMic() {
        if (!this.hasSession) {
          await this.startStreaming();
          return;
        }
        if (this.isStreaming) {
          this.pauseStreaming();
        } else {
          await this.startStreaming(true);
        }
      }

      async startStreaming(isResume = false) {
        if (this.isStreaming) return;
        this.initAudioIfNeeded();
        await this.inputAudioContext.resume();
        await this.outputAudioContext.resume();

        await this.ensureSession();

        this.mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        this.sourceNode = this.inputAudioContext.createMediaStreamSource(this.mediaStream);
        this.sourceNode.connect(this.inputNode);

        const bufferSize = 256;
        this.scriptProcessorNode = this.inputAudioContext.createScriptProcessor(bufferSize, 1, 1);
        this.scriptProcessorNode.onaudioprocess = (e) => {
          if (!this.isStreaming) return;
          const pcm = e.inputBuffer.getChannelData(0);
          this.session?.sendRealtimeInput?.({ media: createBlob(pcm) });
        };

        this.sourceNode.connect(this.scriptProcessorNode);
        this.scriptProcessorNode.connect(this.inputAudioContext.destination);

        this.isStreaming = true;
        this.hasSession = true;
        this.setHasSession(true);
        
        // Only set streaming state if model is not speaking
        if (!this.isModelSpeaking) {
          this.setStreaming(true);
        }
        
        this.updateButtonLabel();
      }

      pauseStreaming() {
        if (!this.isStreaming && !this.mediaStream) {
          this.updateButtonLabel();
          return;
        }
        this.isStreaming = false;
        this.setStreaming(false);
        
        try { this.scriptProcessorNode?.disconnect(); } catch {}
        try { this.sourceNode?.disconnect(); } catch {}
        this.scriptProcessorNode = null;
        this.sourceNode = null;
        if (this.mediaStream) {
          try { this.mediaStream.getTracks().forEach(t => t.stop()); } catch {}
          this.mediaStream = null;
        }
        this.updateButtonLabel();
      }

      reset() {
        this.pauseStreaming();
        this.activeSources = 0;
        for (const s of this.sources.values()) { try { s.stop(); } catch {} }
        this.sources.clear();
        this.nextStartTime = this.outputAudioContext?.currentTime ?? 0;
        try { this.session?.close?.(); } catch {}
        this.session = null;
        this.hasSession = false;
        this.isModelSpeaking = false;
        this.setHasSession(false);
        this.setSpeaking(false);
        this.setStreaming(false);
        this.updateButtonLabel();
      }
    }

    customElements.define("gdm-live-audio", GdmLiveAudio);

    // Minimal bridge for SwiftUI
    window.liveAudio = {
      get el() { return document.querySelector("gdm-live-audio"); },
      async toggle() { return this.el?.toggleMic(); },
      async pause() { return this.el?.pauseStreaming(); },
      async reset() { return this.el?.reset(); },
      state() { return this.el?._state ?? { isStreaming: false, isSpeaking: false, hasSession: false }; },
      syncStateToTitle() { this.el?.syncStateToTitle(); },
    };
  </script>
</body>
</html>
